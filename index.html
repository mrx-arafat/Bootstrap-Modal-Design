<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modal</title>

    <!-- link css -->

    <link rel="stylesheet" href="style.css" />

    <!-- link bootstrap -->
    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
      integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <!-- modal start -->

    <button
      type="button"
      class="btn btn-secondary"
      data-toggle="modal"
      data-target="#exampleModal"
      data-whatever="@mdo"
    >
      Click Modal
    </button>

    <div
      class="modal fade"
      id="exampleModal"
      tabindex="-1"
      role="dialog"
      aria-labelledby="exampleModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog" role="document">
        <div class="modal-content modal-content">
          <!-- modal head -->

          <div class="modal-header d-flex">

            
            <h1 class="modal-title header-title" id="exampleModalLabel">
              Pink<span class="blood">Blood</span>
            </h1>
<div class="img-contaner"> <img class="modal-img" src="img/vector-man-light-bulb.jpg" alt="" /></div>
       
            <button
              type="button"
              class="close"
              data-dismiss="modal"
              aria-label="Close"
            >
              <span aria-hidden="true">&times;</span>
            </button>
          </div>

          <!-- modal body  -->
          <div class="modal-body">
            <form>
            
              <div class="form-group">
                <label for="message-text" class="col-form-label"
                  >Contact:</label
                >
                <input class="form-control" id="message-text"></>
              </div>
              <div class="form-group">
                <label for="message-text" class="col-form-label"
                  >Residence:</label
                >
                <input class="form-control" id="message-text"></>
              </div>
              <div class="form-group">
                <label for="message-text" class="col-form-label"
                  >Current Location:</label
                >
                <input class="form-control" id="message-text"></>
              </div>
            </form>
          </div>
          <div class="modal-footer d-flex justify-content-center py-4">
            <button
              type="button"
              class="btn fw-bold button"
              data-dismiss="modal"
            >
             Ask For Donation
            </button>
            
          </div>
        </div>
      </div>
    </div>

    <!-- scripts  -->

    <script
      src="https://code.jquery.com/jquery-3.2.1.slim.min.js"
      integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"
      integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"
      integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
